name: 每日更新国外域名代理列表

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# 关键：在顶层显式声明所有权限
permissions:
  contents: write
  actions: write
  checks: write
  metadata: read

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 运行生成脚本
        run: |
          chmod +x scripts/generate-proxy-list.sh
          ./scripts/generate-proxy-list.sh

      - name: 提交更新文件到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxy-list.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新代理列表 - $(date +'%Y-%m-%d')"
          git push

  keepalive-job:
    name: Keepalive Workflow
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
          time_elapsed: 45
