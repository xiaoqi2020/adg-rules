name: 每日更新国外域名代理列表

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨3点（UTC）
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write
  actions: write          # keepalive 需要这个权限

jobs:
  # ============ 主任务：更新规则文件 ============
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 运行生成脚本
        run: |
          chmod +x scripts/generate-proxy-list.sh
          ./scripts/generate-proxy-list.sh

      - name: 提交更新文件到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxy-list.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新代理列表 - $(date +'%Y-%m-%d')"
          git push

  # ============ 保活任务：防止被暂停（新增！） ============
  keepalive-job:
    name: Keepalive Workflow
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true          # 使用 API 模式（不产生空提交）
          time_elapsed: 45       # 45天无活动时触发保活
