name: 每日更新国外域名代理列表

on:
  schedule:
    # 每天凌晨3点运行（UTC时间，对应北京时间上午11点）
    - cron: '0 3 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送到仓库

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 运行生成脚本
        run: |
          chmod +x scripts/generate-proxy-list.sh
          ./scripts/generate-proxy-list.sh

      # ============ 直接提交到仓库根目录，获取固定链接 ============
      - name: 提交更新文件到仓库（固定路径）
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxy-list.txt
          # 只有当文件真正有变化时才提交，避免空提交
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新代理列表 - $(date +'%Y-%m-%d')"
          git push
